version: 0.2

phases:
  pre_build:
    commands:
      - echo "Installing security scanning tools..."
      - pip install checkov
      - echo "Installing tfsec..."
      - wget -O tfsec https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-linux-amd64
      - chmod +x tfsec
      - mv tfsec /usr/local/bin/
      - echo "Security scanning tools installed successfully"

  build:
    commands:
      - echo "Running Checkov security scan..."
      - checkov -d ops/iac --framework terraform --output cli --output junitxml --output-file-path checkov-results.xml || echo "Checkov found security issues (non-blocking)"
      - echo "Running tfsec security scan..."
      - tfsec ops/iac --format junit --out tfsec-results.xml || echo "tfsec found security issues (non-blocking)"
      - echo "Security scans completed successfully"

  post_build:
    commands:
      - echo "Security scan results:"
      - ls -la *.xml
      - echo "Security scanning phase completed"

artifacts:
  files:
    - '**/*'
  name: security-scan-results-$(date +%Y-%m-%d-%H-%M-%S)
