AWSTemplateFormatVersion: '2010-09-09'
Description: CI/CD Pipeline for E-Commerce Platform
Parameters:
  PipelineRoleArn:
    Type: String
    Description: IAM role ARN for CodePipeline
  ArtifactBucket:
    Type: String
    Description: S3 bucket for pipeline artifacts
  SnsTopicArn:
    Type: String
    Description: SNS topic ARN for notifications
  GitHubOwner:
    Type: String
    Description: GitHub repository owner
  GitHubRepo:
    Type: String
    Description: GitHub repository name
  GitHubToken:
    Type: String
    Description: GitHub OAuth token
Resources:
  CodePipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: ecommerce-cicd-pipeline
      RoleArn: !Ref PipelineRoleArn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Stages:
        - Name: Source
          Actions:
            - Name: GitHubSource
              ActionTypeId:
                Category: Source
                Owner: ThirdParty
                Provider: GitHub
                Version: 1
              OutputArtifacts:
                - Name: SourceOutput
              Configuration:
                Owner: !Ref GitHubOwner
                Repo: !Ref GitHubRepo
                Branch: devLerdi
                OAuthToken: !Ref GitHubToken
                PollForSourceChanges: true
        - Name: Infrastructure
          Actions:
            - Name: TerraformBuild
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: 1
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: TerraformOutput
              Configuration:
                ProjectName: ecommerce-terraform
        - Name: Application
          Actions:
            - Name: WebAppBuild
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: 1
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: WebAppOutput
              Configuration:
                ProjectName: ecommerce-webapp

  # CloudWatch Event Rule to trigger pipeline on every push
  PipelineTriggerRule:
    Type: AWS::Events::Rule
    Properties:
      Name: ecommerce-pipeline-trigger
      Description: Trigger pipeline on every push to devLerdi branch
      EventPattern:
        source:
          - aws.codecommit
        detail-type:
          - CodeCommit Repository State Change
        resources:
          - !Sub "arn:aws:codecommit:${AWS::Region}:${AWS::AccountId}:${GitHubRepo}"
        detail:
          referenceType:
            - branch
          referenceName:
            - devLerdi
      State: ENABLED
      Targets:
        - Arn: !Sub "arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:pipeline/ecommerce-cicd-pipeline"
          Id: PipelineTrigger
          RoleArn: !Ref PipelineRoleArn

  # IAM Role for EventBridge to trigger pipeline
  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ecommerce-pipeline-trigger-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipelineTriggerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - codepipeline:StartPipelineExecution
                Resource: !Sub "arn:aws:codepipeline:${AWS::Region}:${AWS::AccountId}:pipeline/ecommerce-cicd-pipeline"